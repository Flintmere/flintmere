# Flintmere Shopify app — configuration (Shopify CLI reads this)
# Canonical per `memory/product-engineering/shopify-api-rules.md`.
# Operator fills client_id + application_url after `shopify app config link`.

name = "Flintmere"
handle = "flintmere"
# client_id = ""  # set via `shopify app config link`
application_url = "https://app.flintmere.com"
embedded = true

[build]
automatically_update_urls_on_dev = false
include_config_on_deploy = true

[webhooks]
api_version = "2025-01"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app-uninstalled"

  [[webhooks.subscriptions]]
  topics = ["customers/data_request"]
  uri = "/webhooks/customers-data-request"
  compliance_topics = ["customers/data_request"]

  [[webhooks.subscriptions]]
  topics = ["customers/redact"]
  uri = "/webhooks/customers-redact"
  compliance_topics = ["customers/redact"]

  [[webhooks.subscriptions]]
  topics = ["shop/redact"]
  uri = "/webhooks/shop-redact"
  compliance_topics = ["shop/redact"]

  [[webhooks.subscriptions]]
  topics = ["products/create", "products/update", "products/delete"]
  uri = "/webhooks/products"

[access_scopes]
# Minimum scopes for read + metafield writes. Never add a scope without ADR.
scopes = "read_products,write_products,read_product_listings,write_metaobject_definitions,write_metaobjects"

[auth]
redirect_urls = [
  "https://app.flintmere.com/auth/callback",
  "https://app.flintmere.com/auth/shopify/callback"
]

[pos]
embedded = false
